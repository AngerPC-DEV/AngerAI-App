name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user --upgrade buildozer cython

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/home/runner/android-sdk
          mkdir -p $ANDROID_HOME
          # Скачиваем commandline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip -d /tmp/tools
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          mv /tmp/tools/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          
          # Принимаем лицензии
          mkdir -p $ANDROID_HOME/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8613" >> $ANDROID_HOME/licenses/android-sdk-license
          
          # Устанавливаем компоненты
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25.1.8937393"

      - name: Build APK
        env:
          # КЛЮЧЕВОЙ МОМЕНТ: переопределяем пути для Buildozer
          ANDROID_HOME: /home/runner/android-sdk
          ANDROID_SDK_ROOT: /home/runner/android-sdk
          ANDROID_NDK_HOME: /home/runner/android-sdk/ndk/25.1.8937393
        run: |
          export PATH=$PATH:~/.local/bin
          # Запускаем сборку
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AngerAI-APK
          path: bin/*.apk
