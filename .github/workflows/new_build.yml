name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Setup Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install --user --upgrade buildozer
          pip3 install --user --upgrade cython

      - name: Build APK
        run: |
          # Добавляем путь к pip в PATH
          export PATH=$PATH:~/.local/bin
          buildozer android debug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AngerAI-APK
          path: bin/*.apk
