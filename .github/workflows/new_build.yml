name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          pip3 install --user --upgrade pip
          pip3 install --user --upgrade buildozer cython

      - name: Build APK
        env:
          BUILDOZER_HOME: /home/runner/.buildozer
        run: |
          export PATH=$PATH:~/.local/bin
          # Магия: принудительно принимаем лицензии для всех компонентов
          yes | buildozer android update || true
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AngerAI-APK
          path: bin/*.apk
